  /auth/register/:
    post:
      operationId: user_registration
      description: "\n    Register a new user account with complete profile information\
        \ in one step.\n    \n    **User Types:**\n    - **Producer**: Requires categories,\
        \ ID cards, country, and address. Needs email verification.\n    - **Consumer**:\
        \ Minimal requirements. Auto-activated upon registration.\n    - **Admin**:\
        \ Full privileges, auto-activated (restricted endpoint).\n    \n    **Required\
        \ Fields for All Users:**\n    - email, password, first_name, last_name, phone,\
        \ city, user_type, terms_accepted\n    \n    **Additional Requirements for\
        \ Producers:**\n    - categories (at least one)\n    - recto_id & verso_id\
        \ (ID card images)\n    - country, address\n    \n    **Password Requirements:**\n\
        \    - Minimum 8 characters\n    - Must contain letters and numbers\n    -\
        \ Cannot be too common or entirely numeric\n    "
      summary: Complete User Account Registration
      tags:
      - Authentication
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserRegistrationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserRegistrationRequest'
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegistrationRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                ProducerRegistrationSuccess:
                  value:
                    message: Producer account created. Please check your email to
                      activate your account.
                    user:
                      id: 3
                      email: newproducer@example.com
                      first_name: Pierre
                      last_name: Durand
                      phone: '+33123456789'
                      city: Paris
                      country: France
                      address: 123 rue de la République
                      description: Local organic farmer specializing in vegetables
                      user_type: producer
                      profile_completed: true
                      is_verified: false
                      email_verified: false
                      is_active: false
                      user_categories:
                      - id: 1
                        name: Vegetables
                      - id: 3
                        name: Organic
                      id_card_info:
                        uploaded_at: '2024-01-25T09:45:00Z'
                      date_joined: '2024-01-25T09:45:00Z'
                  summary: Producer Registration Success
                ConsumerRegistrationSuccess:
                  value:
                    message: Consumer account created successfully. You can now log
                      in.
                    user:
                      id: 4
                      email: newconsumer@example.com
                      first_name: Sophie
                      last_name: Bernard
                      phone: '+33987654321'
                      city: Lyon
                      country: ''
                      address: ''
                      description: ''
                      user_type: consumer
                      profile_completed: true
                      is_verified: true
                      email_verified: true
                      is_active: true
                      user_categories: []
                      id_card_info: null
                      favorites: []
                      date_joined: '2024-01-25T09:45:00Z'
                  summary: Consumer Registration Success
          description: Account created successfully with complete profile. Check response
            message for next steps.
        '400':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                EmailAlreadyExists:
                  value:
                    email:
                    - User with this email already exists.
                  summary: Email Already Exists
                PasswordValidationErrors:
                  value:
                    password:
                    - Password fields do not match.
                    non_field_errors:
                    - This password is too short. It must contain at least 8 characters.
                  summary: Password Validation Errors
                MissingRequiredFields-General:
                  value:
                    email:
                    - This field is required.
                    first_name:
                    - This field is required.
                    last_name:
                    - This field is required.
                    phone:
                    - This field is required.
                    city:
                    - This field is required.
                    user_type:
                    - This field is required.
                    terms_accepted:
                    - You must accept the terms and conditions.
                  summary: Missing Required Fields - General
                ProducerSpecificValidationErrors:
                  value:
                    categories:
                    - At least one category is required for producers.
                    id_cards:
                    - Both front and back ID card images are required for producers.
                    country:
                    - Country is required for producers.
                    address:
                    - Address is required for producers.
                  summary: Producer Specific Validation Errors
                InvalidFileUpload:
                  value:
                    recto_id:
                    - Upload a valid image. The file you uploaded was either not an
                      image or a corrupted image.
                    verso_id:
                    - File size too large. Maximum size is 5MB.
                  summary: Invalid File Upload
                InvalidCategorySelection:
                  value:
                    categories:
                    - Invalid pk "999" - object does not exist.
                  summary: Invalid Category Selection
                PhoneNumberValidation:
                  value:
                    phone:
                    - Enter a valid phone number.
                  summary: Phone Number Validation
          description: Registration failed due to validation errors. All required
            fields must be provided based on user type.
        '413':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                FileTooLarge:
                  value:
                    detail: Request entity too large. Maximum file size is 5MB per
                      image.
                  summary: File Too Large
          description: Uploaded files are too large.
        '429':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                RateLimited:
                  value:
                    detail: Too many registration attempts. Please try again in 10
                      minutes.
                    retry_after: 600
                  summary: Rate Limited
          description: Too many registration attempts from this IP address.
  /auth/login/:
    post:
      operationId: user_login
      description: "\n    Authenticate user with email and password credentials. Returns\
        \ JWT access and refresh tokens along with user profile data.\n    \n    **Remember\
        \ Me Feature:**\n    - When `remember_me` is true, refresh token expires in\
        \ 30 days\n    - When `remember_me` is false or omitted, refresh token expires\
        \ in 7 days\n    - Access tokens always expire after 15 minutes regardless\
        \ of remember_me setting\n    \n    Rate limited to 5 attempts per minute\
        \ for security.\n    "
      summary: User Authentication
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
                remember_me:
                  type: boolean
                  default: false
                  description: Keep user logged in for 30 days instead of 7 days
              required:
              - email
              - password
            examples:
              LoginWithRememberMe:
                value:
                  email: user@example.com
                  password: SecurePassword123!
                  remember_me: true
                summary: Login with Remember Me
              LoginWithoutRememberMe:
                value:
                  email: user@example.com
                  password: SecurePassword123!
                summary: Login without Remember Me
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                LoginWithRememberMe:
                  value:
                    email: user@example.com
                    password: SecurePassword123!
                    remember_me: true
                  summary: Login with Remember Me
                LoginWithoutRememberMe:
                  value:
                    email: user@example.com
                    password: SecurePassword123!
                  summary: Login without Remember Me
                SuccessfulProducerLogin:
                  value:
                    access: eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9...
                    refresh: eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9...
                    user:
                      id: 1
                      email: producer@example.com
                      first_name: Jean
                      last_name: Dupont
                      user_type: producer
                      is_verified: true
                      email_verified: true
                      is_active: true
                      date_joined: '2024-01-15T10:30:00Z'
                  summary: Successful Producer Login
                SuccessfulConsumerLogin:
                  value:
                    access: eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9...
                    refresh: eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9...
                    user:
                      id: 2
                      email: consumer@example.com
                      first_name: Marie
                      last_name: Martin
                      user_type: consumer
                      is_verified: true
                      email_verified: true
                      is_active: true
                      date_joined: '2024-01-20T14:15:00Z'
                  summary: Successful Consumer Login
          description: Authentication successful. JWT tokens and user data returned.
        '400':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                MissingCredentials:
                  value:
                    email:
                    - This field is required.
                    password:
                    - This field is required.
                  summary: Missing Credentials
                InvalidEmailFormat:
                  value:
                    email:
                    - Enter a valid email address.
                  summary: Invalid Email Format
                AccountNotActivated:
                  value:
                    detail: Account is not activated. Please check your email for
                      verification link.
                  summary: Account Not Activated
                AccountBlocked:
                  value:
                    detail: Your account has been temporarily blocked. Contact support
                      for assistance.
                  summary: Account Blocked
          description: Bad request - Missing fields, invalid input, or account issues.
        '401':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                InvalidCredentials:
                  value:
                    detail: No active account found with the given credentials
                  summary: Invalid Credentials
                IncorrectPassword:
                  value:
                    detail: Unable to log in with provided credentials.
                  summary: Incorrect Password
          description: Authentication failed - Invalid email or password.
        '429':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                RateLimited:
                  value:
                    detail: Too many login attempts. Please try again in 5 minutes.
                    retry_after: 300
                  summary: Rate Limited
          description: Too many requests - Rate limit exceeded.
  /auth/logout/:
    post:
      operationId: user_logout
      description: "\n    Logout user by blacklisting their refresh token. Token becomes\
        \ permanently invalid and cannot be reused.\n    \n    Access tokens remain\
        \ valid until expiration (15 minutes max). Client should clear local token\
        \ storage.\n    "
      summary: User Session Logout
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: {}
            examples:
              LogoutRequest:
                value:
                  refresh: eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9...
                summary: Logout Request
          application/x-www-form-urlencoded:
            schema:
              type: object
              additionalProperties: {}
          multipart/form-data:
            schema:
              type: object
              additionalProperties: {}
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                LogoutRequest:
                  value:
                    refresh: eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9...
                  summary: Logout Request
                LogoutSuccess:
                  value:
                    detail: Logout successful.
                  summary: Logout Success
          description: User logged out successfully. Refresh token blacklisted.
        '400':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                MissingRefreshToken:
                  value:
                    detail: Refresh token is required.
                  summary: Missing Refresh Token
                InvalidTokenFormat:
                  value:
                    detail: Token is not valid.
                  summary: Invalid Token Format
                AlreadyBlacklisted:
                  value:
                    detail: Token is already blacklisted.
                  summary: Already Blacklisted
          description: Logout failed due to missing or invalid refresh token.
        '401':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                AuthenticationRequired:
                  value:
                    detail: Authentication credentials were not provided.
                  summary: Authentication Required
          description: User not authenticated.
  /auth/token/refresh/:
    post:
      operationId: refresh_access_token
      description: "\n    Refresh JWT access token using a valid refresh token. Extends\
        \ token lifetime without re-authentication.\n    \n    Use this endpoint before\
        \ access token expires to maintain session continuity.\n    "
      summary: Refresh Access Token
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: {}
            examples:
              TokenRefreshRequest:
                value:
                  refresh: eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9...
                summary: Token Refresh Request
          application/x-www-form-urlencoded:
            schema:
              type: object
              additionalProperties: {}
          multipart/form-data:
            schema:
              type: object
              additionalProperties: {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                TokenRefreshRequest:
                  value:
                    refresh: eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9...
                  summary: Token Refresh Request
                SuccessfulTokenRefresh:
                  value:
                    access: eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9...
                  summary: Successful Token Refresh
          description: Token refresh successful. New access token returned.
        '401':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                InvalidRefreshToken:
                  value:
                    detail: Token is invalid or expired
                    code: token_not_valid
                  summary: Invalid Refresh Token
                BlacklistedToken:
                  value:
                    detail: Token is blacklisted
                    code: token_not_valid
                  summary: Blacklisted Token
          description: Invalid, expired, or blacklisted refresh token.
        '400':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                MissingRefreshToken:
                  value:
                    refresh:
                    - This field is required.
                  summary: Missing Refresh Token
          description: Bad request - Missing refresh token.
  /auth/change-password/:
    post:
      operationId: change_password
      description: "\n    Change password for currently authenticated user. Requires\
        \ current password verification and new password meeting security requirements.\n\
        \    \n    New password must be minimum 8 characters with letters and numbers.\
        \ Rate limited to 5 attempts per hour per user.\n    "
      summary: Change User Password
      tags:
      - User Management
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordChangeRequest'
          application/x-www-form-urlencoded:
