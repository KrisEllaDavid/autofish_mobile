          type: integer
        description: Nombre d'éléments par page (maximum 50)
        examples:
          10ParPage:
            value: 10
            summary: 10 par page
          20ParPage:
            value: 20
            summary: 20 par page
          50ParPage:
            value: 50
            summary: 50 par page
      - in: query
        name: tri
        schema:
          type: string
          enum:
          - date
          - evaluation
          - nom
          - prix_asc
          - prix_desc
        description: Critère de tri des résultats
        examples:
          ParNomAlphabétique:
            value: nom
            summary: Par nom alphabétique
          PrixCroissant:
            value: prix_asc
            summary: Prix croissant
          PrixDécroissant:
            value: prix_desc
            summary: Prix décroissant
          PlusRécents:
            value: date
            summary: Plus récents
          MieuxNotés:
            value: evaluation
            summary: Mieux notés
      - in: query
        name: type
        schema:
          type: string
          enum:
          - producteurs
          - produits
          - tout
