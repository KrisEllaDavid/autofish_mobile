      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                PasswordChangeSuccess:
                  value:
                    detail: Password changed successfully.
                  summary: Password Change Success
          description: Password updated successfully.
        '400':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                IncorrectCurrentPassword:
                  value:
                    current_password:
                    - Incorrect password.
                  summary: Incorrect Current Password
                WeakNewPassword:
                  value:
                    new_password:
                    - This password is too short. It must contain at least 8 characters.
                    - This password is too common.
                  summary: Weak New Password
                PasswordMismatch:
                  value:
                    new_password2:
                    - The two password fields didn't match.
                  summary: Password Mismatch
                MissingFields:
                  value:
                    current_password:
                    - This field is required.
                    new_password:
                    - This field is required.
                  summary: Missing Fields
          description: Password change failed due to validation errors.
        '401':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                AuthenticationRequired:
                  value:
                    detail: Authentication credentials were not provided.
                  summary: Authentication Required
          description: User not authenticated.
        '429':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                RateLimited:
                  value:
                    detail: Too many password change attempts. Please try again later.
                  summary: Rate Limited
          description: Rate limit exceeded for password changes.
  /auth/delete-account/:
    delete:
      operationId: delete_user_account
      description: "\n    Permanently delete user account and all associated data.\n\
        \n    **This action is irreversible!**\n\n    Deletes:\n    - User profile\
        \ and authentication data\n    - All posts and products\n    - All messages\
        \ and conversations\n    - All orders (as buyer or seller)\n    - All favorites\
        \ and evaluations\n    - All notifications\n    - All images from image server\
        \ (profile pictures, ID cards, product images)\n    - Producer page (if producer)\n\
        \n    Requires authentication. Users can only delete their own account.\n\
        \    "
      summary: Delete User Account
      tags:
      - Authentication
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                AccountDeletedSuccessfully:
                  value:
                    message: Account deleted successfully. All your data has been
                      permanently removed.
                  summary: Account Deleted Successfully
          description: Account and all related data deleted successfully.
        '401':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                AuthenticationRequired:
                  value:
                    detail: Authentication credentials were not provided.
                  summary: Authentication Required
          description: User must be authenticated to delete account.
        '500':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                DeletionFailed:
                  value:
                    error: 'Failed to delete account: Database error'
                  summary: Deletion Failed
          description: Account deletion failed due to server error.
  /verify-email/{token}/:
    get:
      operationId: verify_email_address
      description: "\n    Verify user's email address using verification token sent\
        \ via email. Activates producer accounts after successful verification.\n\
        \    \n    Tokens are single-use and expire after 24 hours. Already verified\
        \ accounts return success status.\n    "
      summary: Email Address Verification
      parameters:
      - in: path
        name: token
        schema:
          type: string
          format: uuid
        description: Email verification token received via email
        required: true
        examples:
          ValidToken:
            value: 123e4567-e89b-12d3-a456-426614174000
            summary: Valid Token
      tags:
      - Authentication
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                VerificationSuccess:
                  value:
                    message: Email verified successfully. Your account is now active.
                  summary: Verification Success
                AlreadyVerified:
                  value:
                    message: Email already verified.
                  summary: Already Verified
          description: Email verification completed successfully.
        '400':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                InvalidToken:
                  value:
                    error: Invalid verification token.
                  summary: Invalid Token
